spring.application.name=bbs

# Datasource - configure these for your MySQL instance
spring.datasource.url=jdbc:mysql://localhost:3306/bbs_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# JWT settings
app.jwt.secret=change_this_secret_to_a_long_random_value_at_least_32_chars
app.jwt.expiration-ms=3600000

# File upload root (local)
uploads.root=uploads

