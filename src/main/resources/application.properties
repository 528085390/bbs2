spring.application.name=bbs

# Datasource - configure these for your MySQL instance
spring.datasource.url=jdbc:mysql://localhost:3306/bbs_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/seed.sql
mybatis.type-aliases-package=com.li.bbs.domain
mybatis.mapper-locations=classpath*:mapper/*.xml
mybatis.configuration.map-underscore-to-camel-case=true


# JWT settings
app.jwt.secret=change_this_secret_to_a_long_random_value_at_least_32_chars
app.jwt.expiration-ms=3600000

# File upload root (local)
uploads.root=uploads

