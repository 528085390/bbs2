server:
  port: 9010
spring:
  application:
    name: bbs-search-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:123456}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/bbs_forum_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  elasticsearch:
    uris: ${ES_URIS:http://127.0.0.1:9200}
    connection-timeout: 5s
    socket-timeout: 30s
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.li.bbs.search.domain
  configuration:
    map-underscore-to-camel-case: true
feign:
  sentinel:
    enabled: true


management:
  endpoints:
    web:
      exposure:
        include: health,info
