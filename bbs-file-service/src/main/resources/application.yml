server:
  port: 9009
spring:
  application:
    name: bbs-file-service
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:123456}
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/bbs_file_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.li.bbs.file.domain
  configuration:
    map-underscore-to-camel-case: true
uploads:
  root: ${UPLOAD_ROOT:uploads}
management:
  endpoints:
    web:
      exposure:
        include: health,info
